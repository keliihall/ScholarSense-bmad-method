location /scholarsense/ {
    root /srv/scholarsense/frontend;
    try_files $uri $uri/ /scholarsense/index.html;
    add_header Content-Security-Policy "frame-ancestors https://portal.stage.invalid" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Content-Type-Options "nosniff" always;
}
