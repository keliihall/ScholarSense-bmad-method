# 状态定义：
# ==========
# Epic 状态：
#   - backlog：Epic 尚未开始
#   - in-progress：Epic 正在实施
#   - done：Epic 的全部 Story 已完成
#
# Epic 状态转换：
#   - backlog → in-progress：创建第一个 Story 文件时自动转换
#   - in-progress → done：全部 Story 达到 done 后手动转换
#
# Story 状态：
#   - backlog：Story 仅存在于 Epic 文件中
#   - ready-for-dev：已在实现产物目录创建 Story 文件
#   - in-progress：开发人员正在实施
#   - review：已准备代码审查
#   - done：Story 已完成
#
# 回顾状态：
#   - optional：可以执行但非必需
#   - done：回顾已完成
#
# 行动项状态：
#   - open：回顾中承诺但尚未处理
#   - in-progress：正在处理
#   - done：已完成
#
# 工作流说明：
# ============
# - 创建首个 Story 文件时，Epic 自动转为 in-progress
# - 团队容量允许时，可并行实施多个 Story
# - 通常在前一个 Story 完成后创建下一个 Story，以吸收实施经验
# - 开发人员将 Story 移至 review 后，再运行代码审查工作流
# - 回顾产生的行动项追加到 action_items，sprint-status 会呈现未完成项

