name: reusable-artifact-signing

on:
  workflow_call:
    inputs:
      artifact_uri: {required: true, type: string}
      sbom_uri: {required: true, type: string}
      release_version: {required: true, type: string}
    outputs:
      attestation_uri:
        value: ${{ jobs.sign.outputs.attestation-uri }}

permissions: {}

env:
  EXPECTED_RUNNER_IMAGE_VERSION: 20260714.240.1

jobs:
  sign:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    outputs:
      attestation-uri: ${{ steps.publish.outputs.attestation-uri }}
    steps:
      - name: Enforce frozen hosted runner image
        run: test "${ImageVersion:-missing}" = "$EXPECTED_RUNNER_IMAGE_VERSION"
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
      - run: ./scripts/install-release-tools.sh "$RUNNER_TEMP/release-tools" signing
      - name: Fetch immutable subjects
        env:
          ORAS_PASSWORD: ${{ github.token }}
        run: |
          "$RUNNER_TEMP/release-tools/oras" login ghcr.io --username "$GITHUB_ACTOR" --password-stdin <<< "$ORAS_PASSWORD"
          mkdir -p release-out/artifact release-out/sbom
          "$RUNNER_TEMP/release-tools/oras" pull "${{ inputs.artifact_uri }}" --output release-out/artifact
          "$RUNNER_TEMP/release-tools/oras" pull "${{ inputs.sbom_uri }}" --output release-out/sbom
      - name: Attest backend provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: release-out/artifact/release-out/build/scholarsense-backend.jar
      - name: Attest frontend provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: release-out/artifact/release-out/build/scholarsense-frontend.tar.gz
      - name: Attest CycloneDX and SPDX SBOMs
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: release-out/artifact/release-out/build/scholarsense-backend.jar
          predicate-type: https://cyclonedx.org/bom
          predicate-path: release-out/sbom/release-out/sbom/backend.cdx.json
      - uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: release-out/artifact/release-out/build/scholarsense-backend.jar
          predicate-type: https://spdx.dev/Document
          predicate-path: release-out/sbom/release-out/sbom/backend.spdx.json
      - uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: release-out/artifact/release-out/build/scholarsense-frontend.tar.gz
          predicate-type: https://cyclonedx.org/bom
          predicate-path: release-out/sbom/release-out/sbom/frontend.cdx.json
      - uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: release-out/artifact/release-out/build/scholarsense-frontend.tar.gz
          predicate-type: https://spdx.dev/Document
          predicate-path: release-out/sbom/release-out/sbom/frontend.spdx.json
      - name: Sign selected artifacts and capture attestations
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p release-out/attestation
          for subject in scholarsense-backend.jar scholarsense-frontend.tar.gz; do
            path="release-out/artifact/release-out/build/$subject"
            stem="${subject%%.*}"
            "$RUNNER_TEMP/release-tools/cosign" sign-blob --yes --bundle "release-out/attestation/${stem}.sigstore.json" "$path"
            sha="$(sha256sum "$path" | cut -d' ' -f1)"
            gh api "repos/${GITHUB_REPOSITORY}/attestations/sha256:${sha}" > "release-out/attestation/${stem}.attestations.json"
            test "$(jq -er '.attestations | length' "release-out/attestation/${stem}.attestations.json")" -ge 3
          done
      - name: Publish immutable signing evidence
        id: publish
        run: |
          files=()
          while IFS= read -r file; do files+=("$file:application/json"); done < <(find release-out/attestation -type f -name '*.json' -print | sort)
          target="ghcr.io/keliihall/scholarsense-release-evidence:attestation-${{ inputs.release_version }}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          digest="$("$RUNNER_TEMP/release-tools/oras" push "$target" "${files[@]}" --format go-template='{{.digest}}')"
          printf 'attestation-uri=ghcr.io/keliihall/scholarsense-release-evidence@%s\n' "$digest" >> "$GITHUB_OUTPUT"
