name: protected-release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: Immutable semantic release version
        required: true
        type: string
      target_environment:
        description: Protected digest-only promotion target
        required: true
        type: choice
        options:
          - stage
          - production
      rollback_version:
        description: Optional historical signed release version to re-verify without rebuilding
        required: false
        type: string
      rollback_environment:
        description: Optional historical ledger environment paired with rollback_version
        required: false
        type: string

permissions: {}

concurrency:
  group: protected-release-${{ inputs.release_version }}
  cancel-in-progress: false

env:
  CANDIDATE_REPOSITORY: ghcr.io/keliihall/scholarsense-release-candidate
  EVIDENCE_REPOSITORY: ghcr.io/keliihall/scholarsense-release-evidence
  MANIFEST_REPOSITORY: ghcr.io/keliihall/scholarsense-release-manifest

jobs:
  build-cas:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    outputs:
      artifact-uri: ${{ steps.publish.outputs.artifact-uri }}
      frontend-sha256: ${{ steps.publish.outputs.frontend-sha256 }}
      build-manifest-sha256: ${{ steps.publish.outputs.build-manifest-sha256 }}
    steps:
      - name: Checkout immutable protected source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
      - name: Install exact JDK 25
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: '25'
      - name: Install exact Node 24.18.0
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
      - name: Bootstrap controlled toolchain and build twice
        run: |
          ./scripts/bootstrap.sh
          ./scripts/build-release.sh release-out/build
          git archive --format=tar HEAD | gzip -n > release-out/build/release-source.tar.gz
      - name: Install digest-verified OCI client
        run: ./scripts/install-release-tools.sh "$RUNNER_TEMP/release-tools" oci
      - name: Authenticate to candidate CAS
        env:
          ORAS_PASSWORD: ${{ github.token }}
        run: |
          "$RUNNER_TEMP/release-tools/oras" login ghcr.io --username "${{ github.actor }}" --password-stdin <<< "$ORAS_PASSWORD"
      - name: Upload and read back exact build bytes by digest
        id: publish
        run: |
          target="${CANDIDATE_REPOSITORY}:${{ inputs.release_version }}-run-${{ github.run_id }}-${{ github.run_attempt }}"
          digest="$("$RUNNER_TEMP/release-tools/oras" push "$target" \
            release-out/build/scholarsense-backend.jar:application/java-archive \
            release-out/build/scholarsense-frontend.tar.gz:application/gzip \
            release-out/build/build-manifest.json:application/vnd.scholarsense.build-manifest.v1+json \
            release-out/build/release-source.tar.gz:application/vnd.scholarsense.release-source.v1+gzip \
            --format go-template='{{.digest}}')"
          uri="${CANDIDATE_REPOSITORY}@${digest}"
          mkdir release-out/readback
          "$RUNNER_TEMP/release-tools/oras" pull "$uri" --output release-out/readback
          cmp release-out/build/scholarsense-backend.jar release-out/readback/release-out/build/scholarsense-backend.jar
          cmp release-out/build/scholarsense-frontend.tar.gz release-out/readback/release-out/build/scholarsense-frontend.tar.gz
          cmp release-out/build/build-manifest.json release-out/readback/release-out/build/build-manifest.json
          printf 'artifact-uri=%s\n' "$uri" >> "$GITHUB_OUTPUT"
          printf 'frontend-sha256=%s\n' "$(sha256sum release-out/build/scholarsense-frontend.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          printf 'build-manifest-sha256=%s\n' "$(sha256sum release-out/build/build-manifest.json | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

  sbom-scan:
    needs: build-cas
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    outputs:
      sbom-uri: ${{ steps.publish.outputs.sbom-uri }}
    steps:
      - name: Checkout immutable verifier and policies
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
      - name: Install exact JDK 25
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: '25'
      - name: Install exact Node 24.18.0
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
      - name: Install upstream-bundle-verified security tools
        run: ./scripts/install-release-tools.sh "$RUNNER_TEMP/release-tools" security
      - name: Prewarm exact frontend dependency cache without lifecycle scripts
        run: npm ci --prefix frontend --ignore-scripts --no-audit --no-fund
      - name: Authenticate and fetch selected artifact digest
        env:
          ORAS_PASSWORD: ${{ github.token }}
        run: |
          "$RUNNER_TEMP/release-tools/oras" login ghcr.io --username "${{ github.actor }}" --password-stdin <<< "$ORAS_PASSWORD"
          mkdir -p release-out/artifact
          "$RUNNER_TEMP/release-tools/oras" pull "${{ needs.build-cas.outputs.artifact-uri }}" --output release-out/artifact
      - name: Acquire and freeze the vulnerability database snapshot
        run: |
          mkdir -p "$RUNNER_TEMP/docker-config"
          DOCKER_CONFIG="$RUNNER_TEMP/docker-config" "$RUNNER_TEMP/release-tools/trivy" image --cache-dir "$RUNNER_TEMP/trivy-cache" --download-db-only
      - name: Generate, reconcile, scan, and independently check SBOMs
        run: |
          ./scripts/generate-sbom.sh \
            release-out/artifact/release-out/build release-out/sbom \
            "$RUNNER_TEMP/release-tools/trivy" "$RUNNER_TEMP/release-tools/trivy.tar.gz" \
            "$RUNNER_TEMP/release-tools/trivy.sigstore.json" "$RUNNER_TEMP/trivy-cache" \
            trivy-linux-amd64-archive "$RUNNER_TEMP/release-tools/cosign" cosign-linux-amd64
          python3 scripts/check_sbom.py . release-out/artifact/release-out/build release-out/sbom
      - name: Publish immutable SBOM and scan evidence
        id: publish
        run: |
          files=()
          while IFS= read -r file; do files+=("$file:application/json"); done < <(find release-out/sbom -type f -name '*.json' -print | sort)
          target="${EVIDENCE_REPOSITORY}:sbom-${{ inputs.release_version }}-${{ github.run_id }}-${{ github.run_attempt }}"
          digest="$("$RUNNER_TEMP/release-tools/oras" push "$target" "${files[@]}" --format go-template='{{.digest}}')"
          uri="${EVIDENCE_REPOSITORY}@${digest}"
          mkdir release-out/sbom-readback
          "$RUNNER_TEMP/release-tools/oras" pull "$uri" --output release-out/sbom-readback
          python3 scripts/check_sbom.py . release-out/artifact/release-out/build release-out/sbom-readback/release-out/sbom
          printf 'sbom-uri=%s\n' "$uri" >> "$GITHUB_OUTPUT"

  artifact-attestation:
    needs: [build-cas, sbom-scan]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    outputs:
      attestation-uri: ${{ steps.publish.outputs.attestation-uri }}
    steps:
      - name: Checkout immutable signing policy
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
      - name: Install digest-verified OCI and signing clients
        run: ./scripts/install-release-tools.sh "$RUNNER_TEMP/release-tools" signing
      - name: Fetch artifact and SBOM solely by immutable URI
        env:
          ORAS_PASSWORD: ${{ github.token }}
        run: |
          "$RUNNER_TEMP/release-tools/oras" login ghcr.io --username "${{ github.actor }}" --password-stdin <<< "$ORAS_PASSWORD"
          mkdir -p release-out/artifact release-out/sbom
          "$RUNNER_TEMP/release-tools/oras" pull "${{ needs.build-cas.outputs.artifact-uri }}" --output release-out/artifact
          "$RUNNER_TEMP/release-tools/oras" pull "${{ needs.sbom-scan.outputs.sbom-uri }}" --output release-out/sbom
      - name: Attest backend build provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: release-out/artifact/release-out/build/scholarsense-backend.jar
      - name: Attest frontend build provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: release-out/artifact/release-out/build/scholarsense-frontend.tar.gz
      - name: Attest backend CycloneDX SBOM
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: release-out/artifact/release-out/build/scholarsense-backend.jar
          predicate-type: https://cyclonedx.org/bom
          predicate-path: release-out/sbom/release-out/sbom/backend.cdx.json
      - name: Attest frontend CycloneDX SBOM
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: release-out/artifact/release-out/build/scholarsense-frontend.tar.gz
          predicate-type: https://cyclonedx.org/bom
          predicate-path: release-out/sbom/release-out/sbom/frontend.cdx.json
      - name: Sign both selected artifacts and query their attestations
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p release-out/attestation
          for subject in scholarsense-backend.jar scholarsense-frontend.tar.gz; do
            path="release-out/artifact/release-out/build/$subject"
            stem="${subject%%.*}"
            "$RUNNER_TEMP/release-tools/cosign" sign-blob --yes --bundle "release-out/attestation/${stem}.sigstore.json" "$path"
            sha="$(sha256sum "$path" | cut -d' ' -f1)"
            gh api "repos/${GITHUB_REPOSITORY}/attestations/sha256:${sha}" > "release-out/attestation/${stem}.attestations.json"
            test "$(jq -er '.attestations | length' "release-out/attestation/${stem}.attestations.json")" -ge 2
          done
      - name: Publish immutable provenance, attestation, and artifact signatures
        id: publish
        run: |
          files=()
          while IFS= read -r file; do files+=("$file:application/json"); done < <(find release-out/attestation -type f -name '*.json' -print | sort)
          target="${EVIDENCE_REPOSITORY}:attestation-${{ inputs.release_version }}-${{ github.run_id }}-${{ github.run_attempt }}"
          digest="$("$RUNNER_TEMP/release-tools/oras" push "$target" "${files[@]}" --format go-template='{{.digest}}')"
          printf 'attestation-uri=%s@%s\n' "$EVIDENCE_REPOSITORY" "$digest" >> "$GITHUB_OUTPUT"

  formal-web:
    needs: [build-cas, artifact-attestation]
    runs-on: [self-hosted, macOS, ARM64, scholarsense-test-env-1]
    permissions:
      contents: read
      packages: write
    outputs:
      web-uri: ${{ steps.publish.outputs.web-uri }}
    steps:
      - name: Checkout immutable formal verifier
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
      - name: Install exact Node 24.18.0
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
      - name: Install frozen browser-harness dependencies without lifecycle scripts
        run: npm ci --prefix frontend --ignore-scripts --no-audit --no-fund
      - name: Verify and test only frozen frontend bytes
        env:
          ORAS_PASSWORD: ${{ github.token }}
        run: |
          ./scripts/run-formal-web-evidence.sh \
            "${{ needs.build-cas.outputs.artifact-uri }}" \
            "${{ needs.build-cas.outputs.frontend-sha256 }}" \
            "${{ needs.build-cas.outputs.build-manifest-sha256 }}" \
            "1361a3f0fdeb6e747c5c1f6bfc682863d2a96240cd2136ec23c2370e52593fbb" \
            "${{ needs.artifact-attestation.outputs.attestation-uri }}" \
            release-out/formal-web
      - name: Publish formal Web evidence
        id: publish
        env:
          ORAS_PASSWORD: ${{ github.token }}
        run: |
          tools="$RUNNER_TEMP/release-tools-publish"
          config="$RUNNER_TEMP/formal-publish-oras-config.json"
          ./scripts/install-release-tools-macos.sh "$tools" oci
          "$tools/oras" --registry-config "$config" login ghcr.io --username "${{ github.actor }}" --password-stdin <<< "$ORAS_PASSWORD"
          cd release-out/formal-web
          files=()
          while IFS= read -r file; do files+=("$file:application/json"); done < <(find . -type f -name '*.json' -print | sort)
          while IFS= read -r file; do files+=("$file:image/png"); done < <(find . -type f -name '*.png' -print | sort)
          target="${EVIDENCE_REPOSITORY}:web-${{ inputs.release_version }}-${{ github.run_id }}-${{ github.run_attempt }}"
          digest="$("$tools/oras" --registry-config "$config" push "$target" "${files[@]}" --format go-template='{{.digest}}')"
          uri="${EVIDENCE_REPOSITORY}@${digest}"
          mkdir "$RUNNER_TEMP/formal-web-readback"
          "$tools/oras" --registry-config "$config" pull "$uri" --output "$RUNNER_TEMP/formal-web-readback"
          while IFS= read -r file; do cmp "$file" "$RUNNER_TEMP/formal-web-readback/${file#./}"; done < <(find . -type f -print | sort)
          printf 'web-uri=%s\n' "$uri" >> "$GITHUB_OUTPUT"

  release-manifest:
    needs: [build-cas, sbom-scan, artifact-attestation, formal-web]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    outputs:
      manifest-uri: ${{ steps.publish.outputs.manifest-uri }}
      manifest-sha256: ${{ steps.publish.outputs.manifest-sha256 }}
    steps:
      - name: Checkout immutable manifest contracts
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
      - name: Install digest-verified OCI client
        run: ./scripts/install-release-tools.sh "$RUNNER_TEMP/release-tools" oci
      - name: Assemble only existing immutable references and freeze once
        env:
          ORAS_PASSWORD: ${{ github.token }}
          ARTIFACT_URI: ${{ needs.build-cas.outputs.artifact-uri }}
          SBOM_URI: ${{ needs.sbom-scan.outputs.sbom-uri }}
          ATTESTATION_URI: ${{ needs.artifact-attestation.outputs.attestation-uri }}
          WEB_URI: ${{ needs.formal-web.outputs.web-uri }}
        run: |
          "$RUNNER_TEMP/release-tools/oras" login ghcr.io --username "${{ github.actor }}" --password-stdin <<< "$ORAS_PASSWORD"
          python3 scripts/assemble-release-manifest-input.py "${{ inputs.release_version }}" release-out/release-input.json
          python3 release/generate_manifests.py release release-out/release-input.json release-out/release-manifest.json
      - name: Publish the frozen unsigned ReleaseManifest
        id: publish
        run: |
          target="${MANIFEST_REPOSITORY}:${{ inputs.release_version }}-${{ github.run_id }}-${{ github.run_attempt }}"
          digest="$("$RUNNER_TEMP/release-tools/oras" push "$target" release-out/release-manifest.json:application/vnd.scholarsense.release-manifest.v1+json --format go-template='{{.digest}}')"
          printf 'manifest-uri=%s@%s\n' "$MANIFEST_REPOSITORY" "$digest" >> "$GITHUB_OUTPUT"
          printf 'manifest-sha256=%s\n' "$(sha256sum release-out/release-manifest.json | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

  manifest-signature:
    needs: release-manifest
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      signature-uri: ${{ steps.publish.outputs.signature-uri }}
    steps:
      - name: Checkout immutable signing policy
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
      - name: Install digest-verified signing clients
        run: ./scripts/install-release-tools.sh "$RUNNER_TEMP/release-tools" signing
      - name: Fetch frozen manifest, sign it, and publish only the external bundle
        id: publish
        env:
          ORAS_PASSWORD: ${{ github.token }}
        run: |
          "$RUNNER_TEMP/release-tools/oras" login ghcr.io --username "${{ github.actor }}" --password-stdin <<< "$ORAS_PASSWORD"
          mkdir -p release-out/manifest release-out/manifest-signature
          "$RUNNER_TEMP/release-tools/oras" pull "${{ needs.release-manifest.outputs.manifest-uri }}" --output release-out/manifest
          manifest="release-out/manifest/release-out/release-manifest.json"
          "$RUNNER_TEMP/release-tools/cosign" sign-blob --yes --bundle release-out/manifest-signature/release-manifest.sigstore.json "$manifest"
          target="${EVIDENCE_REPOSITORY}:manifest-signature-${{ inputs.release_version }}-${{ github.run_id }}-${{ github.run_attempt }}"
          digest="$("$RUNNER_TEMP/release-tools/oras" push "$target" release-out/manifest-signature/release-manifest.sigstore.json:application/vnd.dev.sigstore.bundle.v0.3+json --format go-template='{{.digest}}')"
          printf 'signature-uri=%s@%s\n' "$EVIDENCE_REPOSITORY" "$digest" >> "$GITHUB_OUTPUT"

  evidence-index:
    needs: [release-manifest, manifest-signature]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    outputs:
      index-uri: ${{ steps.publish.outputs.index-uri }}
      index-sha256: ${{ steps.publish.outputs.index-sha256 }}
    steps:
      - name: Checkout immutable index contracts
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
      - name: Install digest-verified OCI client
        run: ./scripts/install-release-tools.sh "$RUNNER_TEMP/release-tools" oci
      - name: Build EvidenceIndex after manifest signature exists
        env:
          ORAS_PASSWORD: ${{ github.token }}
          MANIFEST_URI: ${{ needs.release-manifest.outputs.manifest-uri }}
          SIGNATURE_URI: ${{ needs.manifest-signature.outputs.signature-uri }}
        run: |
          "$RUNNER_TEMP/release-tools/oras" login ghcr.io --username "${{ github.actor }}" --password-stdin <<< "$ORAS_PASSWORD"
          python3 scripts/assemble-evidence-index-input.py release-out/index-input.json
          python3 release/generate_manifests.py index release-out/index-input.json release-out/evidence-index.json
      - name: Publish immutable EvidenceIndex
        id: publish
        run: |
          target="${MANIFEST_REPOSITORY}:evidence-index-${{ inputs.release_version }}-${{ github.run_id }}-${{ github.run_attempt }}"
          digest="$("$RUNNER_TEMP/release-tools/oras" push "$target" release-out/evidence-index.json:application/vnd.scholarsense.evidence-index.v1+json --format go-template='{{.digest}}')"
          printf 'index-uri=%s@%s\n' "$MANIFEST_REPOSITORY" "$digest" >> "$GITHUB_OUTPUT"
          printf 'index-sha256=%s\n' "$(sha256sum release-out/evidence-index.json | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

  independent-verifier:
    needs: [build-cas, sbom-scan, artifact-attestation, formal-web, release-manifest, manifest-signature, evidence-index]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout verifier from immutable source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
      - name: Re-fetch and verify every subject, attestation, and signature
        env:
          ORAS_PASSWORD: ${{ github.token }}
          ARTIFACT_URI: ${{ needs.build-cas.outputs.artifact-uri }}
          SBOM_URI: ${{ needs.sbom-scan.outputs.sbom-uri }}
          ATTESTATION_URI: ${{ needs.artifact-attestation.outputs.attestation-uri }}
          WEB_URI: ${{ needs.formal-web.outputs.web-uri }}
          MANIFEST_URI: ${{ needs.release-manifest.outputs.manifest-uri }}
          SIGNATURE_URI: ${{ needs.manifest-signature.outputs.signature-uri }}
          INDEX_URI: ${{ needs.evidence-index.outputs.index-uri }}
        run: ./scripts/verify-release.sh

  promotion:
    needs: [build-cas, sbom-scan, artifact-attestation, formal-web, release-manifest, manifest-signature, evidence-index, independent-verifier]
    runs-on: ubuntu-24.04
    environment: ${{ inputs.target_environment }}
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout immutable promotion adapter
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
      - name: Re-verify current remote evidence, promote by digest, and reconcile ledger
        env:
          ORAS_PASSWORD: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
          ARTIFACT_URI: ${{ needs.build-cas.outputs.artifact-uri }}
          SBOM_URI: ${{ needs.sbom-scan.outputs.sbom-uri }}
          ATTESTATION_URI: ${{ needs.artifact-attestation.outputs.attestation-uri }}
          WEB_URI: ${{ needs.formal-web.outputs.web-uri }}
          MANIFEST_URI: ${{ needs.release-manifest.outputs.manifest-uri }}
          MANIFEST_SHA256: ${{ needs.release-manifest.outputs.manifest-sha256 }}
          SIGNATURE_URI: ${{ needs.manifest-signature.outputs.signature-uri }}
          INDEX_URI: ${{ needs.evidence-index.outputs.index-uri }}
          EVIDENCE_INDEX_SHA256: ${{ needs.evidence-index.outputs.index-sha256 }}
          PROMOTION_APPROVER: protected-environment:${{ inputs.target_environment }}
        run: |
          output="$RUNNER_TEMP/promotion-record.json"
          if [[ -n "${{ inputs.rollback_version }}" || -n "${{ inputs.rollback_environment }}" ]]; then
            ./scripts/promote-release.sh \
              "${{ inputs.release_version }}" "${{ inputs.target_environment }}" "$output" \
              "${{ inputs.rollback_version }}" "${{ inputs.rollback_environment }}"
          else
            ./scripts/promote-release.sh \
              "${{ inputs.release_version }}" "${{ inputs.target_environment }}" "$output"
          fi
