name: ci-read-only

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout immutable event source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Install exact JDK 25
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: '25'
      - name: Install exact Node 24.18.0
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
      - name: Install exact PostgreSQL 18.4
        env:
          PGDG_PACKAGE_VERSION: 18.4-1.pgdg24.04+1
        run: |
          sudo install -d -m 0755 /usr/share/postgresql-common/pgdg
          curl --proto '=https' --tlsv1.2 --fail --silent --show-error \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo tee /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc >/dev/null
          echo 'deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt-archive.postgresql.org/pub/repos/apt noble-pgdg-archive main' \
            | sudo tee /etc/apt/sources.list.d/pgdg-archive.list >/dev/null
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            "postgresql-18=$PGDG_PACKAGE_VERSION" \
            "postgresql-client-18=$PGDG_PACKAGE_VERSION"
          test "$(/usr/lib/postgresql/18/bin/postgres --version)" = 'postgres (PostgreSQL) 18.4 (Ubuntu 18.4-1.pgdg24.04+1)'
          test -f /usr/share/postgresql/18/postgres.bki
          printf '%s\n' \
            'SCHOLARSENSE_POSTGRES18_BIN=/usr/lib/postgresql/18/bin' \
            'SCHOLARSENSE_POSTGRES18_SHARE=/usr/share/postgresql/18' \
            >> "$GITHUB_ENV"
      - name: Bootstrap and run the complete local quality gate
        run: ./scripts/verify.sh
      - name: Recheck release schemas, policies, fixtures, and tamper cases
        run: |
          python3 scripts/check_release_contracts.py .
          python3 -m unittest scripts.tests.test_release_security_policy scripts.tests.test_release_workflows
